<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="./img/money-bag-emoji.jpg" type="image/x-icon">
  <title>Acesso - Viana Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-container {
      width: 100%; max-width: 400px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
      animation: fadeIn 0.5s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    
    h1 { font-size: 24px; color: #333; margin-bottom: 8px; }
    p.subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
    
    input { 
      width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: border 0.3s;
    }
    input:focus { outline: none; border-color: #1a73e8; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }
    
    .btn-main { width: 100%; padding: 12px; border: none; border-radius: 8px; background: #1a73e8; color: white; font-weight: 600; cursor: pointer; margin-bottom: 10px; transition: background 0.3s; }
    .btn-main:hover { background: #1557b0; }
    .btn-main:disabled { background: #ccc; cursor: not-allowed; }
    
    .btn-sec { background: none; border: 1px solid #1a73e8; color: #1a73e8; width: 100%; padding: 10px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.3s; }
    .btn-sec:hover { background: #e8f0fe; }

    .forgot-pass {
      display: block; text-align: right; font-size: 12px; color: #666; text-decoration: none; margin-top: -5px; margin-bottom: 15px;
    }
    .forgot-pass:hover { color: #1a73e8; text-decoration: underline; }

    .msg { font-size: 13px; margin-top: 15px; display: none; padding: 10px; border-radius: 6px; line-height: 1.4; }
    .err { background: #fdecea; color: #ea4335; border: 1px solid #fad2cf; }
    .suc { background: #e6f4ea; color: #1e8e3e; border: 1px solid #ceead6; }
  </style>
</head>
<body>

<div class="login-container">
  <h1>💰 Viana Controle</h1>
  <p class="subtitle" id="subtitle">Faça login para continuar</p>

  <input type="email" id="email" placeholder="E-mail" />
  <input type="password" id="senha" placeholder="Senha" />
  
  <!-- Link Esqueci a Senha -->
  <a href="#" class="forgot-pass" id="linkEsqueci" onclick="recuperarSenha(event)">Esqueceu a senha?</a>

  <button class="btn-main" id="btnLogin">Entrar</button>
  <button class="btn-sec" id="btnReg">Criar nova conta</button>
  
  <div id="feedback" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendEmailVerification, onAuthStateChanged, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk",
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto",
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776",
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const feedback = document.getElementById('feedback');
  const emailInput = document.getElementById('email');
  const senhaInput = document.getElementById('senha');
  const btnLogin = document.getElementById('btnLogin');
  const btnReg = document.getElementById('btnReg');
  const linkEsqueci = document.getElementById('linkEsqueci');
  const subtitle = document.getElementById('subtitle');

  function showMsg(txt, isErr = true) {
    feedback.textContent = txt;
    feedback.className = `msg ${isErr ? 'err' : 'suc'}`;
    feedback.style.display = 'block';
  }

  // Função de Login
  btnLogin.onclick = async () => {
    const email = emailInput.value;
    const senha = senhaInput.value;
    
    if(!email || !senha) return showMsg("Preencha e-mail e senha.");

    btnLogin.disabled = true;
    btnLogin.textContent = "Entrando...";

    try {
      const res = await signInWithEmailAndPassword(auth, email, senha);
      if(!res.user.emailVerified) {
        showMsg("⚠️ Por favor, verifique seu e-mail antes de acessar. Verifique também o Spam.");
        await signOut(auth);
      } else {
        showMsg("✅ Login realizado com sucesso!", false);
        setTimeout(() => window.location.href = "index.html", 1000);
      }
    } catch (e) { 
      let msg = "E-mail ou senha incorretos.";
      if(e.code === 'auth/user-not-found') msg = "Usuário não encontrado.";
      if(e.code === 'auth/wrong-password') msg = "Senha incorreta.";
      showMsg(msg); 
    } finally {
      btnLogin.disabled = false;
      btnLogin.textContent = "Entrar";
    }
  };

  // Função de Registro
  btnReg.onclick = async () => {
    const email = emailInput.value;
    const senha = senhaInput.value;
    
    if(!email || !senha) return showMsg("Preencha e-mail e senha para criar conta.");
    if(senha.length < 6) return showMsg("A senha deve ter no mínimo 6 dígitos.");

    btnReg.disabled = true;
    btnReg.textContent = "Criando...";

    try {
      const res = await createUserWithEmailAndPassword(auth, email, senha);
      await sendEmailVerification(res.user);
      
      // Limpa campos
      emailInput.value = "";
      senhaInput.value = "";
      
      showMsg("✅ Conta criada! Enviamos um link de confirmação para seu e-mail.\nPor favor, confirme antes de entrar.", false);
      
      // Opcional: Desabilitar botão de login até confirmar (visual apenas)
      btnLogin.disabled = true;
      btnLogin.textContent = "Aguardando confirmação...";
      subtitle.textContent = "Verifique seu e-mail";
      
    } catch (e) { 
      let msg = "Erro ao criar conta.";
      if(e.code === 'auth/email-already-in-use') msg = "Este e-mail já está em uso.";
      showMsg(msg + " (" + e.code + ")"); 
    } finally {
      btnReg.disabled = false;
      btnReg.textContent = "Criar nova conta";
    }
  };

  // Função Recuperar Senha
  window.recuperarSenha = async (e) => {
    e.preventDefault();
    const email = emailInput.value;
    
    if(!email) return showMsg("Digite seu e-mail acima para recuperar a senha.");

    try {
      await sendPasswordResetEmail(auth, email);
      showMsg("✅ Enviamos um link para redefinir sua senha para " + email, false);
      senhaInput.value = "";
      senhaInput.focus();
    } catch (error) {
      showMsg("Erro: " + error.message);
    }
  };

  // Monitoramento de Estado
  onAuthStateChanged(auth, (user) => {
    if(user && user.emailVerified) {
      window.location.href = "index.html";
    }
  });
</script>
</body>
</html>
