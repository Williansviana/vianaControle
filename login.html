<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6a11cb">
  <link rel="icon" href="img/logo_oficial.png" type="image/png">
  <link rel="apple-touch-icon" href="img/logo_oficial.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Viana">

  <title>Viana Controle - Acesso</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --primary: #6a11cb;
      --secondary: #2575fc;
      --text-dark: #1e293b;
      --glass: rgba(255, 255, 255, 0.95);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }

    .login-container {
      width: 100%; max-width: 420px; padding: 40px 30px;
      background: var(--glass);
      backdrop-filter: blur(15px);
      border-radius: 30px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      text-align: center;
    }

    .brand-logo { 
      width: 85px; height: 85px; object-fit: contain; 
      margin-bottom: 15px; border-radius: 20px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    h1 { font-size: 26px; font-weight: 700; color: var(--text-dark); margin: 0; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 30px; }

    .tabs-nav { 
      display: flex; background: #f1f5f9; padding: 5px; border-radius: 16px; margin-bottom: 25px;
    }
    .tab-btn { 
      flex: 1; padding: 12px; border: none; background: none; cursor: pointer; 
      font-weight: 700; color: #64748b; border-radius: 12px; transition: 0.3s;
    }
    .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    .content-section { display: none; text-align: left; animation: slideUp 0.4s ease-out; }
    .content-section.active { display: block; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

    .input-group { margin-bottom: 18px; }
    label { font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 6px; display: block; padding-left: 4px; }
    
    input { 
      width: 100%; padding: 15px; border: 2px solid #e2e8f0; 
      border-radius: 14px; font-size: 15px; transition: 0.3s; background: #f8fafc;
    }
    input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(106, 17, 203, 0.1); }

    .btn { 
      width: 100%; padding: 16px; border: none; border-radius: 14px; 
      font-weight: 700; cursor: pointer; display: flex; align-items: center; 
      justify-content: center; gap: 10px; transition: 0.3s; font-size: 15px;
    }
    .btn-login { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; margin-top: 10px; }
    .btn-pix { background: #1e293b; color: white; }
    .btn-whatsapp { background: #22c55e; color: white; display: none; margin-top: 15px; }

    #qrcode { text-align: center; margin: 20px 0; display: none; }
    #qrcode img { margin: 0 auto; border: 8px solid white; border-radius: 15px; }
    
    .pix-area {
      background: #f1f5f9; padding: 15px; border-radius: 12px; border: 2px dashed #cbd5e1;
      font-size: 11px; word-break: break-all; color: #475569; font-family: monospace; cursor: pointer;
    }

    .msg { font-size: 13px; margin-top: 20px; display: none; padding: 14px; border-radius: 14px; font-weight: 600; text-align: center; }
    .err { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
    .success { background: #f0fdf4; color: #16a34a; border: 1px solid #dcfce7; }
  </style>
</head>
<body>

<div class="login-container">
  <img src="img/logo_oficial .png" alt="Logo" class="brand-logo">
  <h1>Viana Controle</h1>
  <p class="subtitle">Faça login ou libere seu acesso</p>

  <div class="tabs-nav">
    <button class="tab-btn active" id="btn-tab-login" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" id="btn-tab-pagamento" onclick="switchTab('pagamento')">Liberação</button>
  </div>

  <div id="section-login" class="content-section active">
    <div class="input-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="exemplo@email.com">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••">
    </div>
    <button class="btn btn-login" id="btnLogin">Acessar Sistema</button>
  </div>

  <div id="section-pagamento" class="content-section">
    <div style="background: #eff6ff; padding: 15px; border-radius: 14px; margin-bottom: 20px; color: #1e40af; font-size: 13px; line-height: 1.4;">
      💎 <b>Taxa Única: R$ 5,00</b>. Acesso vitalício liberado após envio do comprovante.
    </div>
    
    <button class="btn btn-pix" onclick="gerarPix()">⚡ Gerar QR Code Pix</button>
    
    <div id="qrcode"></div>
    
    <div id="pix-area-container" style="display:none; margin-top: 15px;">
        <div class="pix-area" id="pix-text" onclick="copiarPix()"></div>
        <p style="font-size: 10px; color: #64748b; text-align: center; margin-top: 8px;">Clique acima para copiar o código</p>
    </div>

    <div class="input-group" style="margin-top:20px;">
        <label>Nome do Usuário</label>
        <input type="text" id="nome-usuario" placeholder="Seu nome completo" onkeyup="validarZap()">
    </div>
    <button id="btn-whatsapp" class="btn btn-whatsapp" onclick="enviarZap()">📲 Enviar Comprovante</button>
  </div>

  <div id="feedback" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk",
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto",
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776",
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // Registro do SW para PWA
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    });
  }

  // LÓGICA DE LOGIN/CADASTRO
  document.getElementById('btnLogin').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const fb = document.getElementById('feedback');
    const btn = document.getElementById('btnLogin');

    if(!email || !senha) {
        fb.textContent = "⚠️ Informe os dados de acesso.";
        fb.className = "msg err"; fb.style.display = "block";
        return;
    }

    btn.disabled = true; btn.textContent = "Processando..."; fb.style.display = "none";

    try {
      let userRes;
      try {
        userRes = await signInWithEmailAndPassword(auth, email, senha);
      } catch (err) {
        if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential') {
          // Tenta criar conta se não encontrar ou falhar a primeira vez
          userRes = await createUserWithEmailAndPassword(auth, email, senha);
          await setDoc(doc(db, "usuarios", userRes.user.uid), { email, aprovado: false });
        } else { throw err; }
      }

      const userDoc = await getDoc(doc(db, "usuarios", userRes.user.uid));
      
      if (userDoc.exists() && userDoc.data().aprovado === true) {
        window.location.href = "index.html";
      } else {
        fb.textContent = "✅ Conta pronta! Agora realize o pagamento para liberar.";
        fb.className = "msg success"; fb.style.display = "block";
        switchTab('pagamento');
        await signOut(auth);
      }
    } catch (e) {
      fb.textContent = "❌ Verifique seus dados ou tente novamente.";
      fb.className = "msg err"; fb.style.display = "block";
    } finally {
      btn.disabled = false; btn.textContent = "Acessar Sistema";
    }
  };

  // INTERFACE E PIX
  const PIX_STRING = "00020126360014BR.GOV.BCB.PIX0114+551999679685152040000530398654045.005802BR5901N6001C62070503***63049D51";

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.getElementById(`section-${tab}`).classList.add('active');
    document.getElementById(`btn-tab-${tab}`).classList.add('active');
    document.getElementById('feedback').style.display = "none";
  };

  window.gerarPix = () => {
    const qrCont = document.getElementById('qrcode');
    qrCont.style.display = "block"; qrCont.innerHTML = "";
    new QRCode(qrCont, { text: PIX_STRING, width: 170, height: 170 });
    document.getElementById('pix-text').textContent = PIX_STRING;
    document.getElementById('pix-area-container').style.display = "block";
  };

  window.copiarPix = () => {
    navigator.clipboard.writeText(PIX_STRING);
    alert("Código Pix Copiado!");
  };

  window.validarZap = () => {
    const nome = document.getElementById('nome-usuario').value;
    document.getElementById('btn-whatsapp').style.display = nome.trim().length >= 3 ? 'flex' : 'none';
  };

  window.enviarZap = () => {
    const nome = document.getElementById('nome-usuario').value;
    const msg = encodeURIComponent(`Olá! Fiz o pagamento de R$ 5,00. Nome: ${nome}. Aguardo liberação.`);
    window.open(`https://wa.me/5519996796851?text=${msg}`, '_blank');
  };
</script>
</body>
</html>
