<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <link rel="shortcut icon" href="./img/money-bag-emoji.jpg" type="image/x-icon">
  <title>💰 Viana Controle - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .login-container {
      width: 100%; max-width: 420px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center;
    }
    h1 { font-size: 22px; color: #333; margin-bottom: 20px; }
    
    .step-box {
      background: #f8f9fa; border: 1px solid #e9ecef; border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: left;
    }
    .step-title { font-weight: 600; color: #1a73e8; margin-bottom: 10px; display: block; font-size: 15px; }
    
    input { 
      width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; transition: 0.3s;
    }
    input:focus { border-color: #1a73e8; outline: none; box-shadow: 0 0 0 3px rgba(26,115,232,0.1); }

    .btn { 
      width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; 
      display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; font-size: 14px; text-decoration: none;
    }
    .btn-pix { background: #6f42c1; color: white; }
    .btn-pix:hover { background: #5a32a3; }
    
    .btn-copy { background: #e2e8f0; color: #475569; margin-top: 10px; font-size: 12px; }
    
    /* Ajuste no Botão WhatsApp */
    .btn-whatsapp { 
        background: #25D366; 
        color: white; 
        margin-top: 10px; 
        display: none; /* Começa escondido, aparece via JS */
    }
    .btn-whatsapp:hover { background: #1ebc57; opacity: 0.9; }

    .btn-login { background: #1a73e8; color: white; margin-top: 10px; }
    .btn-login:disabled { background: #ccc; cursor: not-allowed; }

    #area-pix { 
      display: none; margin-top: 15px; text-align: center; border-top: 1px solid #eee; padding-top: 15px;
    }
    #qrcode { display: inline-block; padding: 10px; background: white; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
    
    .pix-key-display {
      font-family: monospace; font-size: 10px; background: #f1f5f9; padding: 10px; border-radius: 4px;
      word-break: break-all; display: block; color: #64748b; cursor: pointer; border: 1px dashed #cbd5e1;
    }

    .msg { font-size: 13px; margin-top: 15px; display: none; padding: 12px; border-radius: 6px; line-height: 1.4; }
    .err { background: #fdecea; color: #ea4335; border: 1px solid #fad2cf; }
    .suc { background: #e6f4ea; color: #1e8e3e; border: 1px solid #ceead6; }
  </style>
</head>
<body>

<div class="login-container">
  <h1>💰 Viana Controle</h1>

  <div class="step-box">
    <span class="step-title">1️⃣ Pagamento (R$ 5,00)</span>
    <button class="btn btn-pix" id="btnGerarPix" onclick="gerarPix()">Gerar QR Code Pix</button>
    
    <div id="area-pix">
      <div id="qrcode"></div>
      <p style="font-size: 11px; color: #666; margin-bottom: 5px;">Clique no código abaixo para copiar:</p>
      <span class="pix-key-display" id="pix-text" onclick="copiarPix()"></span>
      <button class="btn btn-copy" id="btnCopiar" onclick="copiarPix()">📋 Copiar Código Pix</button>
    </div>
  </div>

  <div class="step-box">
    <span class="step-title">2️⃣ Após o pagamento, enviar mensagem para liberar acesso.</span>
    <input type="text" id="nome-usuario" placeholder="Seu Nome Completo" onkeyup="validarWhatsapp()">
    
    <button id="btn-whatsapp" class="btn btn-whatsapp" onclick="enviarWhatsapp()">
      📲 Enviar Comprovante no WhatsApp
    </button>
  </div>

  <div class="step-box" style="background: #f0f7ff; border-color: #1a73e8;">
    <span class="step-title">3️⃣ Acesso ao Sistema</span>
    <input type="email" id="email" placeholder="E-mail">
    <input type="password" id="senha" placeholder="Senha">
    <button class="btn btn-login" id="btnLogin">Entrar</button>
  </div>
  
  <div id="feedback" class="msg"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk",
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto",
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776",
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const WHATSAPP_NUM = "5519996796851";
  
  // Substitua pela sua string "Copia e Cola" completa
  const PIX_COPIA_E_COLA = "00020126360014BR.GOV.BCB.PIX0114+551999679685152040000530398654045.005802BR5901N6001C62070503***63049D51";

  function showMsg(txt, type = 'err') {
    const fb = document.getElementById('feedback');
    fb.textContent = txt;
    fb.className = `msg ${type}`;
    fb.style.display = "block";
    setTimeout(() => fb.style.display = "none", 5000);
  }

  // --- FUNÇÕES GLOBAIS ---

  window.gerarPix = () => {
    const qrDiv = document.getElementById('qrcode');
    qrDiv.innerHTML = "";
    new QRCode(qrDiv, { text: PIX_COPIA_E_COLA, width: 150, height: 150 });
    document.getElementById('pix-text').textContent = PIX_COPIA_E_COLA;
    document.getElementById('area-pix').style.display = 'block';
  };

  window.copiarPix = () => {
    const pixText = document.getElementById('pix-text').textContent;
    if(!pixText) return;
    navigator.clipboard.writeText(pixText).then(() => {
      const btnCopy = document.getElementById('btnCopiar');
      const original = btnCopy.innerHTML;
      btnCopy.innerHTML = "✅ Copiado!";
      setTimeout(() => btnCopy.innerHTML = original, 2000);
    });
  };

  // CORREÇÃO: O botão aparece apenas com o nome preenchido
  window.validarWhatsapp = () => {
    const nome = document.getElementById('nome-usuario').value;
    const btnZap = document.getElementById('btn-whatsapp');
    
    if(nome.trim().length >= 3) {
      btnZap.style.display = 'flex'; // Exibe o botão
    } else {
      btnZap.style.display = 'none'; // Esconde se apagar o nome
    }
  };

  window.enviarWhatsapp = () => {
    const nome = document.getElementById('nome-usuario').value;
    const msg = encodeURIComponent(`Olá! Meu nome é ${nome}. Fiz o pagamento de R$ 5,00 para o Viana Controle. Segue o comprovante para liberação!`);
    window.open(`https://wa.me/${WHATSAPP_NUM}?text=${msg}`, '_blank');
  };

  // --- LOGIN ---
  document.getElementById('btnLogin').onclick = async () => {
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const btn = document.getElementById('btnLogin');

    if(!email || !senha) return showMsg("Preencha e-mail e senha.");

    btn.disabled = true;
    btn.textContent = "Carregando...";

    try {
      const userRes = await signInWithEmailAndPassword(auth, email, senha);
      const uid = userRes.user.uid;
      const userDoc = await getDoc(doc(db, "usuarios", uid));

      if (userDoc.exists() && userDoc.data().aprovado === true) {
        showMsg("✅ Sucesso!", "suc");
        window.location.href = "index.html";
      } else {
        showMsg("⚠️ Pagamento não aprovado ainda. Fale conosco no WhatsApp.");
        await signOut(auth);
        btn.disabled = false;
        btn.textContent = "Entrar";
      }
    } catch (e) {
      showMsg("Dados incorretos.");
      btn.disabled = false;
      btn.textContent = "Entrar";
    }
  };
</script>
</body>
</html>
