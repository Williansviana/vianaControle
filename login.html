<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6a11cb">
  <link rel="icon" href="img/logo_oficial.png" type="image/png">
  <link rel="apple-touch-icon" href="img/logo_oficial.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Viana">

  <title>Viana Controle - Acesso</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  
  <style>
    :root {
      --primary: #6a11cb;
      --secondary: #2575fc;
      --accent: #00d2ff;
      --text-dark: #1e293b;
      --glass: rgba(255, 255, 255, 0.9);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
      margin: 0; min-height: 100vh;
      display: flex; align-items: center; justify-content: center; padding: 20px;
      overflow: hidden;
    }

    /* Elementos decorativos de fundo */
    body::before, body::after {
      content: ""; position: absolute; width: 300px; height: 300px; border-radius: 50%;
      background: linear-gradient(var(--accent), var(--secondary));
      z-index: -1; opacity: 0.4; filter: blur(80px);
    }
    body::before { top: -10%; left: -10%; }
    body::after { bottom: -10%; right: -10%; }

    .login-container {
      width: 100%; max-width: 420px; padding: 40px 30px;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      border: 1px solid rgba(255, 255, 255, 0.3);
      text-align: center;
    }

    .brand-logo { 
      width: 90px; height: 90px; object-fit: contain; 
      margin-bottom: 15px; border-radius: 20px;
      filter: drop-shadow(0 10px 15px rgba(0,0,0,0.1));
    }

    h1 { font-size: 28px; font-weight: 700; color: var(--text-dark); margin: 0; letter-spacing: -0.5px; }
    .subtitle { color: #64748b; font-size: 14px; margin-bottom: 30px; }

    .tabs-nav { 
      display: flex; background: #f1f5f9; padding: 5px; border-radius: 14px; margin-bottom: 30px;
    }
    .tab-btn { 
      flex: 1; padding: 12px; border: none; background: none; cursor: pointer; 
      font-weight: 600; color: #64748b; border-radius: 10px; transition: 0.3s;
    }
    .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

    .content-section { display: none; text-align: left; animation: slideUp 0.4s ease-out; }
    .content-section.active { display: block; }

    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

    .input-group { margin-bottom: 20px; }
    label { font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 8px; display: block; padding-left: 5px; }
    
    input { 
      width: 100%; padding: 15px 18px; border: 2px solid #e2e8f0; 
      border-radius: 15px; font-size: 15px; transition: 0.3s; background: #f8fafc;
      color: var(--text-dark);
    }
    input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 4px rgba(106, 17, 203, 0.1); }

    .btn { 
      width: 100%; padding: 16px; border: none; border-radius: 15px; 
      font-weight: 700; cursor: pointer; display: flex; align-items: center; 
      justify-content: center; gap: 10px; transition: 0.3s; font-size: 16px;
    }
    .btn:hover { transform: translateY(-2px); opacity: 0.9; }
    .btn-login { background: linear-gradient(to right, var(--primary), var(--secondary)); color: white; box-shadow: 0 10px 20px -5px rgba(106, 17, 203, 0.4); }
    
    .btn-pix { background: #1e293b; color: white; }
    .btn-whatsapp { background: #22c55e; color: white; display: none; margin-top: 15px; }

    #qrcode { text-align: center; margin: 25px 0; display: none; }
    #qrcode img { 
      margin: 0 auto; border: 10px solid white; border-radius: 20px; 
      box-shadow: 0 15px 30px rgba(0,0,0,0.1); 
    }
    
    .pix-area {
      background: #f1f5f9; padding: 15px; border-radius: 15px; border: 2px dashed #cbd5e1;
    }
    .pix-box { font-size: 12px; word-break: break-all; color: #475569; font-family: monospace; cursor: pointer; }

    .msg { font-size: 14px; margin-top: 20px; display: none; padding: 15px; border-radius: 15px; font-weight: 600; text-align: center; }
    .err { background: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
  </style>
</head>
<body>

<div class="login-container">
  <img src="img/logo_oficial .png" alt="Logo Viana" class="brand-logo">
  <h1>Viana Controle</h1>
  <p class="subtitle">Gestão financeira simplificada</p>

  <div class="tabs-nav">
    <button class="tab-btn active" id="btn-tab-login" onclick="switchTab('login')">Entrar</button>
    <button class="tab-btn" id="btn-tab-pagamento" onclick="switchTab('pagamento')">Liberar Acesso</button>
  </div>

  <div id="section-login" class="content-section active">
    <div class="input-group">
      <label>E-mail</label>
      <input type="email" id="email" placeholder="nome@exemplo.com">
    </div>
    <div class="input-group">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••">
    </div>
    <button class="btn btn-login" id="btnLogin">Acessar Minha Conta</button>
  </div>

  <div id="section-pagamento" class="content-section">
    <div style="background: #eff6ff; padding: 15px; border-radius: 15px; margin-bottom: 20px;">
        <p style="font-size: 13px; margin: 0; color: #1e40af; line-height: 1.5;">
            💎 <b>Acesso Vitalício:</b> Pague uma única vez <b>R$ 5,00</b> e use para sempre.
        </p>
    </div>
    
    <button class="btn btn-pix" onclick="gerarPix()">
      <span>⚡</span> Gerar QR Code Pix
    </button>
    
    <div id="qrcode"></div>
    
    <div id="pix-area-container" style="display:none; margin-top: 15px;">
        <div class="pix-area">
            <div class="pix-box" id="pix-text" onclick="copiarPix()"></div>
        </div>
        <p style="font-size: 11px; color: #64748b; text-align: center; margin-top: 8px;">Toque no código acima para copiar</p>
    </div>

    <div class="input-group" style="margin-top:20px;">
        <label>Seu nome (para identificar o pagamento)</label>
        <input type="text" id="nome-usuario" placeholder="Digite seu nome completo" onkeyup="validarZap()">
    </div>
    <button id="btn-whatsapp" class="btn btn-whatsapp" onclick="enviarZap()">
       📲 Enviar Comprovante
    </button>
  </div>

  <div id="feedback" class="msg err"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk",
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto",
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776",
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').catch(err => console.log("Erro SW:", err));
    });
  }

  // --- LOGIN ---
  document.getElementById('btnLogin').onclick = async () => {
    const email = document.getElementById('email').value;
    const senha = document.getElementById('senha').value;
    const fb = document.getElementById('feedback');
    const btn = document.getElementById('btnLogin');

    if(!email || !senha) {
        fb.textContent = "⚠️ Informe seu e-mail e senha.";
        fb.style.display = "block";
        return;
    }

    btn.disabled = true;
    btn.innerHTML = "Verificando...";
    fb.style.display = "none";

    try {
      const userRes = await signInWithEmailAndPassword(auth, email, senha);
      const userDoc = await getDoc(doc(db, "usuarios", userRes.user.uid));

      if (userDoc.exists() && userDoc.data().aprovado === true) {
        window.location.href = "index.html";
      } else {
        fb.textContent = "⏳ Pagamento em análise ou não realizado.";
        fb.style.display = "block";
        switchTab('pagamento');
        await signOut(auth);
      }
    } catch (e) {
      fb.textContent = "❌ Dados de acesso inválidos.";
      fb.style.display = "block";
    } finally {
      btn.disabled = false;
      btn.innerHTML = "Acessar Minha Conta";
    }
  };

  // --- INTERFACE ---
  const PIX_STRING = "00020126360014BR.GOV.BCB.PIX0114+551999679685152040000530398654045.005802BR5901N6001C62070503***63049D51";

  window.switchTab = (tab) => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.getElementById(`section-${tab}`).classList.add('active');
    document.getElementById(`btn-tab-${tab}`).classList.add('active');
    document.getElementById('feedback').style.display = "none";
  };

  window.gerarPix = () => {
    const qrContainer = document.getElementById('qrcode');
    qrContainer.style.display = "block";
    qrContainer.innerHTML = "";
    new QRCode(qrContainer, { text: PIX_STRING, width: 180, height: 180, colorDark: "#1e293b" });
    document.getElementById('pix-text').textContent = PIX_STRING;
    document.getElementById('pix-area-container').style.display = "block";
  };

  window.copiarPix = () => {
    navigator.clipboard.writeText(PIX_STRING);
    alert("✅ Copiado! Cole no seu aplicativo do banco.");
  };

  window.validarZap = () => {
    const nome = document.getElementById('nome-usuario').value;
    document.getElementById('btn-whatsapp').style.display = nome.trim().length >= 3 ? 'flex' : 'none';
  };

  window.enviarZap = () => {
    const nome = document.getElementById('nome-usuario').value;
    const msg = encodeURIComponent(`Olá! Realizei o pagamento de R$ 5,00. Meu nome: ${nome}. Aguardo liberação do Viana Controle.`);
    window.open(`https://wa.me/5519996796851?text=${msg}`, '_blank');
  };
</script>
</body>
</html>
