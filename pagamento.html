<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendente - Viana Controle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7f6;
            margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        .container {
            width: 100%; max-width: 420px; padding: 30px; background: white; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center;
        }
        h2 { color: #1a73e8; margin-bottom: 10px; }
        .step { background: #f8f9fa; border: 1px solid #eee; padding: 20px; border-radius: 12px; margin-bottom: 15px; text-align: left; }
        .btn { 
            width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-pix { background: #6f42c1; color: white; }
        .btn-whatsapp { background: #25D366; color: white; display: none; }
        #qrcode { margin: 15px auto; display: none; padding: 10px; background: white; border: 1px solid #ddd; width: 170px; }
        .pix-key { font-size: 10px; word-break: break-all; background: #eee; padding: 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2>Acesso Pendente ⏳</h2>
    <p style="font-size: 14px; color: #555;">Siga os passos abaixo para liberar seu sistema.</p>

    <div class="step">
        <strong>1. Pagamento de R$ 5,00</strong>
        <button class="btn btn-pix" onclick="gerarPix()">💎 Gerar QR Code Pix</button>
        <div id="qrcode"></div>
        <div id="pix-display" style="display:none">
            <p style="font-size: 11px; margin: 5px 0;">Clique para copiar:</p>
            <div class="pix-key" id="pix-text" onclick="copiarPix()"></div>
        </div>
    </div>

    <div class="step">
        <strong>2. Liberação</strong>
        <p style="font-size: 12px; margin-bottom: 8px;">Após o Pix, envie o comprovante:</p>
        <input type="text" id="nome-usuario" placeholder="Seu Nome" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;" onkeyup="validar()">
        <button id="btn-whatsapp" class="btn btn-whatsapp" onclick="enviarZap()">📲 Enviar Comprovante</button>
    </div>

    <a href="login.html" style="text-decoration:none; font-size:13px; color:#666;">← Voltar ao login</a>
</div>

<script>
    const PIX_CODE = "00020126360014BR.GOV.BCB.PIX0114+551999679685152040000530398654045.005802BR5901N6001C62070503***63049D51";

    function gerarPix() {
        const qrDiv = document.getElementById('qrcode');
        qrDiv.innerHTML = "";
        qrDiv.style.display = "block";
        new QRCode(qrDiv, { text: PIX_CODE, width: 150, height: 150 });
        document.getElementById('pix-text').textContent = PIX_CODE;
        document.getElementById('pix-display').style.display = "block";
    }

    function copiarPix() {
        navigator.clipboard.writeText(PIX_CODE);
        alert("Código Pix copiado!");
    }

    function validar() {
        const nome = document.getElementById('nome-usuario').value;
        document.getElementById('btn-whatsapp').style.display = nome.length > 2 ? 'flex' : 'none';
    }

    function enviarZap() {
        const nome = document.getElementById('nome-usuario').value;
        const msg = encodeURIComponent(`Olá! Sou ${nome}. Fiz o Pix de R$5 e quero liberar meu acesso ao Viana Controle.`);
        window.open(`https://wa.me/5519996796851?text=${msg}`, '_blank');
    }
</script>
</body>
</html>
