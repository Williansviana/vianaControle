<!DOCTYPE html>
<html lang="pt-Br">
<head>
  <meta charset="UTF-8" />
  <title>Viana Controle PRO</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a73e8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="./img/logo oficial.png">
  <link rel="icon" href="./img/logo_oficial .png" type="image/png">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    :root {
      --primary: #1a73e8;
      --bg: #f4f7f9;
      --card: #ffffff;
      --text: #1a1a1a;
      --border: #eeeeee;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --card: #1e1e1e;
        --text: #f0f0f0;
        --border: #333333;
      }
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body { 
      font-family: 'Inter', sans-serif; 
      margin: 0; padding: 15px; 
      background: var(--bg); 
      color: var(--text); 
      transition: 0.3s;
    }

    .app { 
      max-width: 500px; margin: 0 auto; 
      padding: 20px; background: var(--card); 
      border-radius: 28px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h1 { text-align: center; font-size: 22px; color: var(--primary); margin-bottom: 20px; }

    /* Estilo dos Inputs */
    form { background: var(--bg); padding: 15px; border-radius: 18px; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 4px; opacity: 0.7; }
    input { 
      width: 100%; padding: 12px; border: 1px solid var(--border); 
      border-radius: 10px; background: var(--card); color: var(--text);
    }

    /* Botões */
    .btn-primary { 
      background: var(--primary); color: white; border: none; 
      padding: 14px; border-radius: 12px; width: 100%; 
      font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-primary:active { transform: scale(0.96); }

    .btn-outline {
      background: none; border: 1px solid var(--border); color: var(--text);
      padding: 10px; border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer;
    }

    /* Lista de Despesas */
    .expense-item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 14px; border-bottom: 1px solid var(--border);
    }
    .status-badge {
      padding: 3px 7px; border-radius: 5px; font-size: 10px; font-weight: 700; color: white;
    }
    .badge-pago { background: #34a853; }
    .badge-atrasado { background: #ea4335; }

    #chart-area { max-height: 180px; margin-bottom: 20px; }
    .resumo { display: flex; gap: 10px; margin-bottom: 15px; }
    .resumo-card { flex: 1; padding: 15px; border-radius: 15px; text-align: center; font-size: 12px; font-weight: bold; }
    .resumo-card.p { background: #fff3cd; color: #856404; }
    .resumo-card.ok { background: #d4edda; color: #155724; }
  </style>
</head>
<body>

<div class="app">
  <h1>💰 Viana Controle</h1>

  <div id="chart-area"><canvas id="myChart"></canvas></div>

  <div class="resumo" id="resumo"></div>

  <form id="form-despesa">
    <div class="form-group"><label>Descrição</label><input type="text" id="desc" required placeholder="Ex: Aluguel" /></div>
    <div style="display:flex; gap:10px">
      <div class="form-group" style="flex:2"><label>Valor R$</label><input type="number" id="valor" step="0.01" required /></div>
      <div class="form-group" style="flex:1"><label>Parc.</label><input type="number" id="qtd" value="1" min="1" /></div>
    </div>
    <div class="form-group"><label>Data Vencimento</label><input type="date" id="dataBase" required /></div>
    <button type="submit" class="btn-primary">Salvar Lançamento</button>
  </form>

  <button class="btn-outline" onclick="exportarPDF()">📄 Gerar Relatório PDF</button>

  <div id="items-container"></div>

  <button id="btn-logout" class="btn-outline" style="border:none; color:#ea4335; margin-top:20px;">Sair da Conta</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk",
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto",
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776",
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // Registro do Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js'));
  }

  let despesas = [];
  let chartInstance = null;

  onAuthStateChanged(auth, (user) => {
    if (!user) { window.location.href = "login.html"; return; }
    const q = query(collection(db, "despesas"), where("userId", "==", user.uid));
    onSnapshot(q, (snap) => {
      despesas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderAll();
    });
  });

  function renderAll() {
    const container = document.getElementById('items-container');
    const hoje = new Date().toISOString().slice(0, 10);
    container.innerHTML = '';
    let pTotal = 0, okTotal = 0;

    const parcelas = despesas.flatMap(d => d.parcelas.map(p => ({...p, desc: d.desc, dId: d.id})))
                             .sort((a,b) => a.date.localeCompare(b.date));

    parcelas.forEach(item => {
      item.paid ? okTotal += item.value : pTotal += item.value;
      const div = document.createElement('div');
      div.className = 'expense-item';
      const status = item.paid ? '<span class="status-badge badge-pago">PAGO</span>' : (item.date < hoje ? '<span class="status-badge badge-atrasado">ATRASADO</span>' : '');
      
      div.innerHTML = `
        <div>
          <span><strong>${item.desc}</strong> ${status}</span><br>
          <small>${item.date.split('-').reverse().join('/')} | R$ ${item.value.toFixed(2)}</small>
        </div>
        <div>
          ${!item.paid ? `<button onclick="pagar('${item.dId}','${item.id}')" style="border:none; background:none; cursor:pointer;">✅</button>` : ''}
          <button onclick="excluir('${item.dId}')" style="border:none; background:none; cursor:pointer;">🗑️</button>
        </div>`;
      container.appendChild(div);
    });

    document.getElementById('resumo').innerHTML = `
      <div class="resumo-card p">Pendente<br>R$ ${pTotal.toFixed(2)}</div>
      <div class="resumo-card ok">Pago<br>R$ ${okTotal.toFixed(2)}</div>`;
    
    atualizarGrafico(okTotal, pTotal);
  }

  function atualizarGrafico(pagos, pendentes) {
    const ctx = document.getElementById('myChart').getContext('2d');
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(ctx, {
      type: 'doughnut',
      data: {
        datasets: [{ data: [pagos, pendentes], backgroundColor: ['#34a853', '#ea4335'], borderWidth: 0 }]
      },
      options: { cutout: '80%' }
    });
  }

  window.pagar = async (dId, pId) => {
    const d = despesas.find(x => x.id === dId);
    const novas = d.parcelas.map(p => p.id === pId ? {...p, paid: true} : p);
    await updateDoc(doc(db, "despesas", dId), { parcelas: novas });
  };

  window.excluir = async (id) => {
    if(confirm("Excluir?")) await deleteDoc(doc(db, "despesas", id));
  };

  document.getElementById('form-despesa').onsubmit = async (e) => {
    e.preventDefault();
    const desc = document.getElementById('desc').value;
    const valor = parseFloat(document.getElementById('valor').value);
    const qtd = parseInt(document.getElementById('qtd').value);
    const [y, m, d] = document.getElementById('dataBase').value.split('-').map(Number);
    const parcelas = [];
    for(let i=0; i<qtd; i++) {
      const dt = new Date(y, (m - 1) + i, d);
      parcelas.push({ id: Math.random().toString(36).substr(2,9), num: i+1, total: qtd, value: valor, paid: false, date: dt.toISOString().slice(0,10) });
    }
    await addDoc(collection(db, "despesas"), { desc, parcelas, userId: auth.currentUser.uid });
    e.target.reset();
  };

  window.exportarPDF = () => {
    const { jsPDF } = window.jspdf;
    const docPdf = new jsPDF();
    docPdf.text("Relatório Viana Controle", 20, 20);
    let y = 30;
    despesas.forEach(d => { docPdf.text(`${d.desc} - R$ ${d.parcelas[0].value}`, 20, y); y+=10; });
    docPdf.save("Relatorio.pdf");
  };

  document.getElementById('btn-logout').onclick = () => signOut(auth);
</script>
</body>
</html>
