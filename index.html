<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Viana Controle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --muted: #64748b;
      --border: #e2e8f0; --primary: #3b82f6;
      --vencida: #ef4444; --paga: #10b981; --info: #6366f1; --shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8;
              --border: #334155; --vencida: #f87171; --paga: #34d399; }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
    .app { width: 100%; max-width: 420px; }

    header { margin-bottom: 20px; text-align: center; }
    h1 { font-size: 24px; font-weight: 800; color: var(--primary); margin-bottom: 15px; }
    
    .month-nav {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); padding: 10px; border-radius: 14px; box-shadow: var(--shadow); border: 1px solid var(--border);
    }
    .month-nav button { width: 40px; height: 40px; border: none; background: var(--bg); border-radius: 10px; cursor: pointer; color: var(--text); font-size: 18px; }
    #month-label { font-weight: 700; text-transform: capitalize; font-size: 15px; }

    .resumo-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin: 20px 0; }
    .resumo-item { background: var(--card); padding: 12px 8px; border-radius: 12px; border: 1px solid var(--border); text-align: center; box-shadow: var(--shadow); }
    .resumo-item label { display: block; font-size: 9px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .resumo-item span { font-size: 13px; font-weight: 700; display: block; }

    .card { background: var(--card); border-radius: 16px; padding: 16px; margin-bottom: 20px; border: 1px solid var(--border); box-shadow: var(--shadow); }
    form { display: grid; gap: 12px; }
    label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
    input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); font-size: 16px; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
    
    /* EFEITO NO BOTÃO */
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: 700; cursor: pointer; font-size: 15px; transition: all 0.2s ease; }
    .btn:active { transform: scale(0.96); opacity: 0.9; }
    .btn-loading { background: var(--muted); pointer-events: none; }

    .lista-container { background: var(--card); border-radius: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); }
    
    /* ANIMAÇÃO DE ENTRADA DOS ITENS */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .item { 
      display: flex; justify-content: space-between; align-items: center; 
      padding: 16px; border-bottom: 1px solid var(--border); transition: 0.3s;
      animation: slideIn 0.4s ease forwards;
    }
    
    .item.status-paga { border-left: 6px solid var(--paga); background: rgba(16, 185, 129, 0.04); }
    .item.status-paga .name { color: var(--muted); text-decoration: line-through; }
    .item.status-vencida { border-left: 6px solid var(--vencida); background: rgba(239, 68, 68, 0.04); }

    .name { font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 6px; }
    .parcela-tag { font-size: 10px; background: var(--border); padding: 2px 6px; border-radius: 4px; color: var(--muted); }
    .meta { font-size: 12px; color: var(--muted); margin-top: 4px; }
    
    .btn-action { width: 38px; height: 38px; border: none; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); cursor: pointer; font-size: 16px; transition: 0.2s; }
    .btn-action:hover { background: var(--border); }
    .btn-sair { background: transparent; color: var(--muted); border: none; margin-top: 20px; width: 100%; font-size: 13px; text-decoration: underline; cursor: pointer; }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1>Viana Controle</h1>
    <div class="month-nav">
      <button id="prev">←</button>
      <span id="month-label"></span>
      <button id="next">→</button>
    </div>
  </header>

  <div class="resumo-grid">
    <div class="resumo-item" style="border-bottom: 3px solid var(--info);">
      <label>Total Mês</label>
      <span id="total-mes" style="color: var(--text);">R$ 0,00</span>
    </div>
    <div class="resumo-item" style="border-bottom: 3px solid var(--vencida);">
      <label>Restante</label>
      <span id="total-pendente" style="color: var(--vencida);">R$ 0,00</span>
    </div>
    <div class="resumo-item" style="border-bottom: 3px solid var(--paga);">
      <label>Já Pago</label>
      <span id="total-pago" style="color: var(--paga);">R$ 0,00</span>
    </div>
  </div>

  <div class="card">
    <form id="form">
      <label>O que comprou?</label>
      <input type="text" id="desc" placeholder="Ex: Mercado" required />
      <div class="row">
        <div><label>Valor (R$)</label><input type="number" id="valor" step="0.01" inputmode="decimal" required /></div>
        <div><label>Parcelas</label><input type="number" id="qtd" value="1" min="1" /></div>
      </div>
      <label>Data de Vencimento</label>
      <input type="date" id="data" required />
      <button type="submit" id="btn-submit" class="btn">Adicionar Conta</button>
    </form>
  </div>

  <div id="lista" class="lista-container"></div>
  <button id="sair" class="btn btn-sair">Sair do Sistema</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, updateDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

  const config = {
    apiKey: "AIzaSyAjgQTdQmo63-0mR8k1bVYsY0E8I7Iqbnk", 
    authDomain: "will-gasto.firebaseapp.com",
    projectId: "will-gasto", 
    storageBucket: "will-gasto.firebasestorage.app",
    messagingSenderId: "436819384776", 
    appId: "1:436819384776:web:37c4c1173c543c0d1dc8fd"
  };

  const app = initializeApp(config), db = getFirestore(app), auth = getAuth(app);
  let uid = null, allData = [], selectedMonth = new Date().toISOString().slice(0, 7);

  const formatarMoeda = (v) => v.toLocaleString('pt-BR', { minimumFractionDigits: 2 });

  onAuthStateChanged(auth, user => user ? (uid = user.uid, loadData()) : window.location.href = "login.html");

  function loadData() {
    onSnapshot(query(collection(db, "despesas"), where("userId", "==", uid)), snap => {
      allData = [];
      snap.forEach(d => {
        const data = d.data();
        if (data.parcelas) {
          data.parcelas.forEach((p, index) => {
            allData.push({ ...p, desc: data.desc, docId: d.id, nParc: index + 1, totalParc: data.parcelas.length });
          });
        }
      });
      render();
    });
  }

  function render() {
    const box = document.getElementById('lista');
    const monthData = allData.filter(i => i.date.startsWith(selectedMonth)).sort((a,b) => a.date.localeCompare(b.date));
    document.getElementById('month-label').textContent = new Date(selectedMonth + '-02').toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

    const hoje = new Date().toISOString().slice(0, 10);
    let somaTotal = 0, somaPendente = 0, somaPago = 0;
    box.innerHTML = '';

    if(monthData.length === 0) {
        box.innerHTML = '<div style="padding:40px; text-align:center; color:var(--muted); font-size:14px;">Nenhuma conta este mês.</div>';
        atualizarResumo(0, 0, 0);
        return;
    }

    monthData.forEach((item, index) => {
      somaTotal += item.value;
      if (item.paid) somaPago += item.value;
      else somaPendente += item.value;

      const dia = item.date.split('-')[2];
      const estaVencida = item.date < hoje && !item.paid;
      const statusClass = item.paid ? 'status-paga' : (estaVencida ? 'status-vencida' : '');
      
      const div = document.createElement('div');
      div.className = `item ${statusClass}`;
      // Adiciona um pequeno atraso na animação para cada item
      div.style.animationDelay = `${index * 0.05}s`;
      
      div.innerHTML = `
        <div>
          <div class="name">${item.desc} ${item.totalParc > 1 ? `<span class="parcela-tag">${item.nParc}/${item.totalParc}</span>` : ''} ${estaVencida ? '⚠️' : ''}</div>
          <div class="meta">Dia ${dia} • <strong>R$ ${formatarMoeda(item.value)}</strong></div>
        </div>
        <div style="display:flex; gap:10px">
          <button class="btn-action" onclick="toggleStatus('${item.docId}','${item.id}')">${item.paid ? '↩️' : '✅'}</button>
          <button class="btn-action" onclick="excluir('${item.docId}')">🗑️</button>
        </div>`;
      box.appendChild(div);
    });

    atualizarResumo(somaTotal, somaPendente, somaPago);
  }

  function atualizarResumo(total, pendente, pago) {
    document.getElementById('total-mes').textContent = `R$ ${formatarMoeda(total)}`;
    document.getElementById('total-pendente').textContent = `R$ ${formatarMoeda(pendente)}`;
    document.getElementById('total-pago').textContent = `R$ ${formatarMoeda(pago)}`;
  }

  window.toggleStatus = async (docId, pId) => {
    const ref = doc(db, "despesas", docId), snap = await getDoc(ref);
    if (snap.exists()) {
      const novasParcelas = snap.data().parcelas.map(p => p.id === pId ? { ...p, paid: !p.paid } : p);
      await updateDoc(ref, { parcelas: novasParcelas });
    }
  };

  window.excluir = async (id) => { if(confirm('Apagar esta conta?')) await deleteDoc(doc(db, "despesas", id)); };

  document.getElementById('form').onsubmit = async e => {
    e.preventDefault();
    const btn = document.getElementById('btn-submit');
    
    // Efeito Visual de Loading no Botão
    const originalText = btn.textContent;
    btn.textContent = "Salvando...";
    btn.classList.add('btn-loading');

    const desc = document.getElementById('desc').value;
    const valor = parseFloat(document.getElementById('valor').value);
    const qtd = parseInt(document.getElementById('qtd').value) || 1;
    const [y, m, d] = document.getElementById('data').value.split('-').map(Number);
    
    const parcelas = [];
    for(let i=0; i<qtd; i++) {
      const dt = new Date(y, m-1+i, d);
      parcelas.push({ id: Math.random().toString(36).slice(2,9), value: valor, date: dt.toISOString().slice(0,10), paid: false });
    }

    try {
      await addDoc(collection(db, "despesas"), { desc, parcelas, userId: uid });
      e.target.reset();
    } catch (err) {
      alert("Erro ao salvar!");
    } finally {
      // Volta o botão ao normal
      btn.textContent = originalText;
      btn.classList.remove('btn-loading');
    }
  };

  document.getElementById('prev').onclick = () => changeMonth(-1);
  document.getElementById('next').onclick = () => changeMonth(1);
  function changeMonth(dir) {
    const [y, m] = selectedMonth.split('-').map(Number);
    selectedMonth = new Date(y, m-1+dir, 1).toISOString().slice(0, 7);
    render();
  }
  document.getElementById('sair').onclick = () => confirm('Sair?') && signOut(auth);
</script>
</body>
</html>
